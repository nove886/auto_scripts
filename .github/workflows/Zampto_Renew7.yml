name: Zampto 续期

on:
  schedule:
    - cron: '45 6,18 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: Zampto_Renew
      cancel-in-progress: false
    env:
      ZAMPTO_BATCH: ${{ secrets.ZAMPTO_BATCH }}
      # 支持协议: vless, vmess, trojan, ss, hy2, tuic, anytls, socks5
      PROXY_CONTENT: ${{ secrets.ZAMPTO_HY2_PROXY_URL }}
      SOCKS_PORT: ${{ secrets.SOCKS_PORT || '10808' }}
      SCREENSHOT_DIR: screenshots
      PROJECT_DIR: zampto
      PRIVATE_REPO: jyucoeng/zzm

    steps:
      - name: 检出公开仓库
        uses: actions/checkout@v4

      - name: 创建输出目录
        run: mkdir -p ${{ github.repository_owner }}-${{ github.event.repository.name }}-${{ env.PROJECT_DIR }}/${{ env.SCREENSHOT_DIR }}

      - name: 检出私有仓库
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_REPO }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ref: main
          path: ${{ github.repository_owner }}-${{ github.event.repository.name }}-${{ env.PROJECT_DIR }}
          fetch-depth: 1

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装系统依赖
        run: |
          sudo apt-get update && sudo apt-get install -y xvfb fonts-noto-cjk

      - name: 安装 Python 依赖
        run: |
          pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install seleniumbase>=4.25.0 pyvirtualdisplay>=3.0 requests>=2.31.0
          fi

      - name: 安装代理
        working-directory: ${{ github.repository_owner }}-${{ github.event.repository.name }}-${{ env.PROJECT_DIR }}
        run: |
          if [ -z "$PROXY_CONTENT" ]; then
            echo "[INFO] 未配置代理，直连模式"
            exit 0
          fi

          SB_VER="1.13.14"
          ARCHIVE="sing-box-${SB_VER}-linux-amd64.tar.gz"
          wget -q "https://github.com/SagerNet/sing-box/releases/download/v${SB_VER}/${ARCHIVE}"
          tar -xzf "$ARCHIVE" -C /tmp/
          mv "/tmp/sing-box-${SB_VER}-linux-amd64/sing-box" ./sing-box
          chmod +x ./sing-box
          rm -rf "/tmp/sing-box-${SB_VER}-linux-amd64" "$ARCHIVE"
          echo "[INFO] sing-box $(./sing-box version | head -1)"

      - name: 随机延迟
        run: |
          delay=$((RANDOM % 120))
          echo "随机延迟: ${delay}秒"
          sleep $delay

      - name: 执行续期
        working-directory: ${{ github.repository_owner }}-${{ github.event.repository.name }}-${{ env.PROJECT_DIR }}
        env:
          SCREENSHOT_DIR: ${{ github.repository_owner }}-${{ github.event.repository.name }}-${{ env.PROJECT_DIR }}/${{ env.SCREENSHOT_DIR }}
        run: python Zampto_Renew7.py

      - name: 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zampto-screenshots-${{ github.run_id }}
          path: ${{ github.repository_owner }}-${{ github.event.repository.name }}-${{ env.PROJECT_DIR }}/${{ env.SCREENSHOT_DIR }}/
          retention-days: 7

      - name: 清理本地截图
        if: always()
        run: |
          SCREENSHOT_PATH="${{ github.repository_owner }}-${{ github.event.repository.name }}-${{ env.PROJECT_DIR }}/${{ env.SCREENSHOT_DIR }}"
          if [ -d "$SCREENSHOT_PATH" ]; then
            rm -rf "$SCREENSHOT_PATH"/*
            echo "本地截图已清理"
          fi

      - name: 提交执行时间
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p ${{ env.PROJECT_DIR }} && echo "$(date +'%Y-%m-%d %H:%M:%S')" > ${{ env.PROJECT_DIR }}/time.txt
          git add ${{ env.PROJECT_DIR }}/time.txt 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "无变化，无需提交"
          else
            git commit -m "更新时间文件: $(date +'%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: 清理旧运行
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 1
